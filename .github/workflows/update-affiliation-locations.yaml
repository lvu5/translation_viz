name: Update affiliation locations

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: update-affiliation-locations
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install updater dependency
        run: python -m pip install "httpx>=0.27"

      - name: Update static affiliation locations
        id: locations
        env:
          ROR_CLIENT_ID: ${{ secrets.ROR_CLIENT_ID }}
        run: |
          python scripts/update_affiliation_locations.py --write
          if git diff --quiet -- server/affiliation_locations.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.locations.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/update-affiliation-locations"
          base_branch="$(gh repo view "$GITHUB_REPOSITORY" --json defaultBranchRef --jq '.defaultBranchRef.name')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add server/affiliation_locations.json
          git commit -m "Update affiliation locations from ROR"
          git push --force origin "$branch"

          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" --state open --json number --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --title "Update affiliation locations from ROR" --body "Automated daily refresh of static affiliation coordinates, aliases, and logo domains using public dashboard records and ROR."
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base "$base_branch" --head "$branch" --title "Update affiliation locations from ROR" --body "Automated daily refresh of static affiliation coordinates, aliases, and logo domains using public dashboard records and ROR."
          fi
