<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Translation Benchmark</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>
  <header>
    <h1>🪨 Last Translation Benchmark</h1>
    <div>
      <span id="sen-info" class="info"></span>
      &nbsp;<button id="logout-btn">Logout</button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Review Submissions</h2>
      <div class="tabs">
        <button class="tab active" data-filter="pending">Pending</button>
        <button class="tab" data-filter="scored">Scored</button>
        <button class="tab" data-filter="all">All</button>
        <select id="filter-lang" class="tab" style="padding:5px 8px;cursor:pointer;width:auto"><option value="">All Languages</option></select>
        <select id="filter-user" class="tab" style="padding:5px 8px;cursor:pointer;width:auto"><option value="">All Users</option></select>
        <button class="tab refresh-tab" id="refresh-btn">↻ Refresh</button>
      </div>
      <div id="sen-list">
        <div class="empty">Loading…</div>
      </div>
    </div>
  </div>
</body>

</html>
