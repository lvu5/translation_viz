name: Update affiliation locations

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: update-affiliation-locations
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install updater dependency
        run: python -m pip install "httpx>=0.27"

      - name: Update static affiliation locations
        id: locations
        env:
          ROR_CLIENT_ID: ${{ secrets.ROR_CLIENT_ID }}
        run: |
          python scripts/update_affiliation_locations.py --write
          if git diff --quiet -- server/affiliation_locations.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit update to the default branch
        if: steps.locations.outputs.changed == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/affiliation_locations.json
          git commit -m "Update affiliation locations from ROR"
          git pull --rebase origin "$DEFAULT_BRANCH"
          git push origin "HEAD:$DEFAULT_BRANCH"
